services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ./backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./backend/instance:/app/instance
    ports:
      - '5000:5000'
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    command: python app.py

  celery:
    build:
      context: ./backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./backend/instance:/app/instance
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    command: celery -A services.celery_app worker --loglevel=info

  celery-beat:
    build:
      context: ./backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./backend/instance:/app/instance
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    command: celery -A services.celery_app beat --loglevel=info

volumes:
  redis-data:
